<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>AutoTagger</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; }
    h3 { margin: 0 0 16px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .row label { min-width: 80px; font-weight: 600; }
    .row input { flex: 1; padding: 4px 6px; }
    .hint { color: #888; font-size: 0.82em; margin: 4px 0 0 88px; }
    .status { margin-top: 12px; font-size: 0.85em; color: #2a7; display: none; }
  </style>
</head>
<body>
  <h3>AutoTagger</h3>

  <div class="row">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="sk-ant-api03-..." />
  </div>
  <p class="hint">
    Your Anthropic API key. Papers added via the Zotero connector will be tagged automatically
    using Claude. For arXiv papers, subject tags are also fetched from the arXiv taxonomy.
  </p>
  <p class="status" id="status">Saved.</p>

  <script>
    /* global Zotero */
    const PREF_KEY = "extensions.zotero-autotagger.apiKey";
    const input = document.getElementById("api-key");
    const status = document.getElementById("status");

    const saved = Zotero.Prefs.get(PREF_KEY, true);
    if (saved) input.value = saved;

    input.addEventListener("change", () => {
      Zotero.Prefs.set(PREF_KEY, input.value.trim(), true);
      status.style.display = "block";
      setTimeout(() => { status.style.display = "none"; }, 2000);
    });
  </script>
</body>
</html>
