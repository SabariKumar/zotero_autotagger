<div xmlns="http://www.w3.org/1999/xhtml">
<style>
  .autotagger-pane { padding: 16px; font-family: -apple-system, sans-serif; }
  .autotagger-pane h3 { margin: 0 0 16px; }
  .autotagger-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .autotagger-row label { min-width: 120px; font-weight: 600; }
  .autotagger-row input { flex: 1; padding: 4px 6px; }
  .autotagger-hint { color: #888; font-size: 0.82em; margin: 4px 0 0 128px; }
  .autotagger-status { margin-top: 12px; font-size: 0.85em; color: #2a7; display: none; }
  .autotagger-bulk { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 16px; }
  .autotagger-bulk h4 { margin: 0 0 10px; font-size: 0.95em; }
  .autotagger-bulk-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .autotagger-bulk-row button { padding: 5px 12px; cursor: pointer; }
  .autotagger-bulk-row button:disabled { opacity: 0.5; cursor: default; }
  .autotagger-skip-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 0.88em; }
  .autotagger-progress-wrap { margin-top: 10px; display: none; background: #e0e0e0; border-radius: 4px; height: 8px; overflow: hidden; }
  .autotagger-progress-fill { height: 100%; width: 0%; background: #2a7; border-radius: 4px; transition: width 0.2s ease; }
  .autotagger-progress { margin-top: 5px; font-size: 0.85em; color: #555; min-height: 1.2em; }
</style>

<div class="autotagger-pane">
  <h3>AutoTagger</h3>

  <div class="autotagger-row">
    <label for="autotagger-api-key">Anthropic API Key</label>
    <input id="autotagger-api-key" type="password" placeholder="sk-ant-api03-..." />
  </div>
  <p class="autotagger-hint">
    Your <strong>Anthropic</strong> API key (console.anthropic.com) — not your Zotero API key.
    Papers added via the Zotero connector will be tagged automatically using Claude.
    For arXiv papers, subject tags are also fetched from the arXiv taxonomy.
  </p>
  <p class="autotagger-status" id="autotagger-status">Saved.</p>

  <div class="autotagger-bulk">
    <h4>Bulk Tagging</h4>
    <div class="autotagger-bulk-row">
      <button id="autotagger-bulk-btn">Tag All Library Items</button>
    </div>
    <div class="autotagger-skip-row">
      <input type="checkbox" id="autotagger-skip-tagged" checked="true" />
      <label for="autotagger-skip-tagged">Skip items that already have auto-tags</label>
    </div>
    <div class="autotagger-progress-wrap" id="autotagger-progress-wrap">
      <div class="autotagger-progress-fill" id="autotagger-progress-fill"></div>
    </div>
    <p class="autotagger-progress" id="autotagger-progress"></p>
  </div>
</div>

</div>
